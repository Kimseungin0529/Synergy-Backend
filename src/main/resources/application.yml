spring:
  datasource:
    url: jdbc:mysql://${LOCAL_DB_HOST}:3306/conference
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${LOCAL_DB_USER}
    password: ${LOCAL_DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        show-sql: true
        open-in-view: false
        dialect: org.hibernate.dialect.MySQL8Dialect

  cloud:
    aws:
      credentials:
        access-key: ${ACCESS_KEY}
        secret-key: ${SECRETE_KEY}
      region:
        static: ${REGION}
      s3:
        bucket: ${BUCKET_NAME}


