      credentials:
        access-key: ${ACCESS_KEY}
        secret-key: ${SECRET_KEY}
      region:
        static: ${REGION}
      s3:
        bucket: ${BUCKET_NAME}

  servlet:
    multipart:
      enabled: true
      max-file-size: 2MB
      max-request-size: 15MB




